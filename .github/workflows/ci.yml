name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      # The indexer's deploy build deliberately swallows tsc failures
      # ("tsc || true") and workspace packages ship TS source, so type errors
      # in the indexer program surface nowhere else. strictNullChecks (A4b-2)
      # is load-bearing for ProviderResult narrowing — enforce it here.
      - name: Typecheck indexer
        run: pnpm --filter @altscan/indexer exec tsc --noEmit

      # apps/altscan-site ships its own tsx harness (excluded from the root
      # vitest run); run it here so its chain-payload tests still gate PRs.
      - name: Run altscan-site tests
        run: pnpm --filter @altscan/site test
