name: Feature request
description: Suggest an idea or improvement for Altscan
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Is your request related to a problem or limitation you hit?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Which part of the platform?
      options:
        - Explorer UI
        - Public REST API
        - Indexer
        - altscan.io site
        - New chain support
        - Other
