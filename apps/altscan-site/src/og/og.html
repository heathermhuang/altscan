<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  body{margin:0;width:1200px;height:630px;background:#fbfbfc;font-family:-apple-system,Inter,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:90px;box-sizing:border-box}
  .k{font-family:ui-monospace,Menlo,monospace;font-size:22px;letter-spacing:.1em;color:#6c6c77;text-transform:uppercase;margin-bottom:24px}
  h1{font-size:84px;letter-spacing:-.03em;margin:0;color:#101014;line-height:1.02}
  .row{display:flex;gap:14px;margin-top:40px}
  .chip{font-family:ui-monospace,monospace;font-size:24px;font-weight:600;padding:12px 22px;border-radius:12px}
  .b{background:#FACC15;color:#000}.e{background:#1E3A8A;color:#fff}.m{border:2px dashed #c4c4cf;color:#6c6c77}
  .brand{position:absolute;top:70px;left:90px;font-family:ui-monospace,monospace;font-size:30px;font-weight:700}
</style></head><body>
  <div class="brand">altscan<span style="color:#5b5bf0">▋</span></div>
  <div class="k">// open-source · multi-chain · block explorer platform</div>
  <h1>The explorer,<br>for every chain.</h1>
  <div class="row"><span class="chip b">BNBScan</span><span class="chip e">EthScan</span><span class="chip m">+ more</span></div>
</body></html>
